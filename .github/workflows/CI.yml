name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read

env:
  TESTOPTS: --verbose

jobs:
  ruby-versions:
    uses: ruby/actions/.github/workflows/ruby_versions.yml@master
    with:
      engine: cruby
      min_version: 3.1

  lint:
    runs-on: ubuntu-latest

    name: RuboCop
    steps:
    - uses: actions/checkout@v6
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 4.0
        bundler-cache: true
    - uses: r7kamura/rubocop-problem-matchers-action@v1
    - run: bundle exec rubocop --parallel

  rbs:
    runs-on: ubuntu-latest

    name: RBS
    steps:
    - uses: actions/checkout@v6
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 4.0
        bundler-cache: true
    - run: bundle exec rake rbs:validate

  test-linux:
    needs: ruby-versions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        cassandra-version: ['3', '4', '5']
        ruby: ${{ fromJson(needs.ruby-versions.outputs.versions) }}
        exclude:
          - ruby: head

    name: Linux, Cassandra ${{ matrix.cassandra-version }}, Ruby ${{ matrix.ruby }}
    steps:
    - name: Start Cassandra v${{ matrix.cassandra-version }}
      run: |
        docker run --name cassandra -d -p 9042:9042 cassandra:${{ matrix.cassandra-version }}
    - uses: actions/checkout@v6
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Prepare tests
      run: bundle exec rake compile
    - name: Run tests
      run: bundle exec rake test

  test-macos:
    needs: ruby-versions
    runs-on: macos-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ fromJson(needs.ruby-versions.outputs.versions) }}
        exclude:
          - ruby: head

    name: macOS, Ruby ${{ matrix.ruby }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Prepare tests
      run: bundle exec rake compile
